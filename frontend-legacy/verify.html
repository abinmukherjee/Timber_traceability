<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimberTrace — Verify Provenance</title>
  <meta name="description" content="Verify the full blockchain provenance chain for any timber furniture piece." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235;
      --border: #1e293b; --accent: #22c55e; --accent2: #3b82f6; --accent3: #f59e0b;
      --text: #e2e8f0; --muted: #64748b; --danger: #ef4444; --radius: 12px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav { background: rgba(17,24,39,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.25rem; color: var(--accent); text-decoration: none; }
    .nav-brand span { color: var(--text); }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-links a { color: var(--muted); text-decoration: none; padding: 6px 14px; border-radius: 8px; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--accent2); }
    .chain-badge { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

    main { max-width: 800px; margin: 0 auto; padding: 2rem; }

    /* Search box */
    .search-section { text-align: center; padding: 3rem 2rem 2rem; }
    .search-section h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 0.75rem; }
    .search-section h1 span { background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .search-section p { color: var(--muted); margin-bottom: 2rem; }
    .search-row { display: flex; gap: 0.75rem; max-width: 500px; margin: 0 auto; }
    .search-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 0.875rem 1.25rem; font-size: 1rem; font-family: inherit; transition: border-color 0.2s; }
    .search-row input:focus { outline: none; border-color: var(--accent2); }
    .search-row input::placeholder { color: var(--muted); }
    .btn-verify { background: var(--accent2); color: white; border: none; border-radius: 10px; padding: 0.875rem 1.5rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .btn-verify:hover { background: #2563eb; }

    /* Loading */
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 3rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Provenance timeline */
    .provenance-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .provenance-title { font-size: 1.5rem; font-weight: 800; }
    .verified-badge { display: flex; align-items: center; gap: 0.5rem; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--accent); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.875rem; font-weight: 600; }

    .timeline { position: relative; }
    .timeline::before { content: ''; position: absolute; left: 32px; top: 60px; bottom: 60px; width: 2px; background: linear-gradient(to bottom, var(--accent), var(--accent2), var(--accent3)); }

    .chain-node { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; position: relative; }
    .node-icon { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; flex-shrink: 0; position: relative; z-index: 1; }
    .node-icon.forest  { background: rgba(34,197,94,0.15);  border: 2px solid rgba(34,197,94,0.3); }
    .node-icon.lot     { background: rgba(34,197,94,0.1);   border: 2px solid rgba(34,197,94,0.2); }
    .node-icon.batch   { background: rgba(59,130,246,0.15); border: 2px solid rgba(59,130,246,0.3); }
    .node-icon.furn    { background: rgba(245,158,11,0.15); border: 2px solid rgba(245,158,11,0.3); }

    .node-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
    .node-card:hover { border-color: var(--border); }
    .node-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.5rem; }
    .node-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
    .node-title.green  { color: var(--accent); }
    .node-title.blue   { color: var(--accent2); }
    .node-title.amber  { color: var(--accent3); }

    .node-fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    .field { display: flex; flex-direction: column; gap: 2px; }
    .field-label { font-size: 0.7rem; color: var(--muted); font-weight: 500; text-transform: uppercase; }
    .field-value { font-size: 0.875rem; font-weight: 500; }
    .field-value.mono { font-family: monospace; font-size: 0.75rem; }
    .field-value.highlight { font-size: 1.1rem; font-weight: 700; }
    .field-value.green  { color: var(--accent); }
    .field-value.blue   { color: var(--accent2); }
    .field-value.amber  { color: var(--accent3); }

    /* QR code section */
    .qr-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; margin-bottom: 2rem; }
    .qr-section h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; }
    .qr-section img { max-width: 200px; border: 4px solid white; border-radius: 8px; }
    .qr-links { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
    .qr-link { color: var(--accent2); text-decoration: none; font-size: 0.875rem; padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px; }
    .qr-link:hover { border-color: var(--accent2); }

    /* Error */
    .error-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; border-radius: var(--radius); padding: 2rem; text-align: center; }
    .error-box h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">🌲 <span>TimberTrace</span></a>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="auction.html">Auction House</a>
    <a href="factory.html">Factory</a>
    <a href="verify.html" class="active">Verify</a>
    <a href="admin.html">Admin</a>
  </div>
  <span class="chain-badge">⬡ Sepolia</span>
</nav>

<!-- Search section -->
<div class="search-section">
  <h1>🔍 Verify <span>Provenance</span></h1>
  <p>Enter a furniture ID or scan a QR code to trace the complete blockchain supply chain.</p>
  <div class="search-row">
    <input id="furn-id-input" type="number" min="1" placeholder="Furniture ID (e.g. 1)" onkeydown="if(event.key==='Enter') verify()" />
    <button class="btn-verify" onclick="verify()">Verify →</button>
  </div>
</div>

<main>
  <div id="loading" style="display:none;"><div class="spinner"></div></div>
  <div id="error-box" style="display:none;"></div>
  <div id="result" style="display:none;"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<script src="js/contract-config.js"></script>
<script src="js/wallet.js"></script>
<script src="js/api.js"></script>
<script>
  // Auto-load if ?id= is in URL (QR scan flow)
  const urlParams = new URLSearchParams(window.location.search);
  const urlId = urlParams.get('id');
  if (urlId) {
    document.getElementById('furn-id-input').value = urlId;
    window.addEventListener('load', () => verify());
  }

  async function verify() {
    const id = document.getElementById('furn-id-input').value.trim();
    if (!id || isNaN(id) || parseInt(id) < 1) {
      showError('Please enter a valid furniture ID.');
      return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display  = 'none';
    document.getElementById('error-box').style.display = 'none';

    try {
      const data = await apiVerify(id);
      document.getElementById('loading').style.display = 'none';
      renderProvenance(data);
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      showError(`Furniture #${id} not found. Either it doesn't exist yet, or the backend is offline.<br><small>${err.message}</small>`);
    }
  }

  function renderProvenance(data) {
    const { furniture, batch, lot } = data;
    const resultEl = document.getElementById('result');
    resultEl.style.display = 'block';

    const furnId   = furniture.id;
    const qrImgUrl = `http://localhost:8080/api/qr/${furnId}`;
    const ipfsLink = furniture.ipfsHash
      ? `<a href="https://gateway.pinata.cloud/ipfs/${furniture.ipfsHash}" target="_blank" class="qr-link">📄 Certificate (IPFS)</a>`
      : '';

    resultEl.innerHTML = `
      <!-- Header -->
      <div class="provenance-header">
        <div class="provenance-title">Furniture #${furnId} — ${furniture.type || '—'}</div>
        <div class="verified-badge">✅ Verified on Sepolia</div>
      </div>

      <!-- QR Code -->
      <div class="qr-section">
        <h3>📱 QR Code — Scan to re-verify</h3>
        <img src="${qrImgUrl}" alt="QR Code for Furniture #${furnId}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <p style="display:none;color:var(--muted);font-size:0.85rem;">QR code will appear after the event listener processes the FurnitureCreated event.</p>
        <div class="qr-links">
          <a href="?id=${furnId}" class="qr-link">🔗 Permalink</a>
          ${ipfsLink}
          ${furniture.txHash ? `<a href="https://sepolia.etherscan.io/tx/${furniture.txHash}" target="_blank" class="qr-link">⬡ Etherscan</a>` : ''}
        </div>
      </div>

      <!-- Timeline -->
      <div class="timeline">

        <!-- Forest origin (derived from lot data) -->
        <div class="chain-node">
          <div class="node-icon forest">🌳</div>
          <div class="node-card">
            <div class="node-label">Step 1 — Forest Origin</div>
            <div class="node-title green">Timber Source</div>
            <div class="node-fields">
              <div class="field"><span class="field-label">Species</span><span class="field-value green">${lot.species || '—'}</span></div>
              <div class="field"><span class="field-label">Grade</span><span class="field-value">${lot.grade || '—'}</span></div>
              <div class="field"><span class="field-label">Coupe ID</span><span class="field-value">${lot.originCoupeId || '—'}</span></div>
            </div>
          </div>
        </div>

        <!-- Lot -->
        <div class="chain-node">
          <div class="node-icon lot">📦</div>
          <div class="node-card">
            <div class="node-label">Step 2 — Auction Lot</div>
            <div class="node-title green">Lot #${lot.id}</div>
            <div class="node-fields">
              <div class="field"><span class="field-label">Registered by</span><span class="field-value mono">${lot.auctionHouse ? shortenAddr(lot.auctionHouse) : '—'}</span></div>
              <div class="field"><span class="field-label">Initial Qty</span><span class="field-value highlight green">${lot.initialQty ?? '—'} cft</span></div>
              <div class="field"><span class="field-label">Remaining</span><span class="field-value">${lot.remainingQty ?? '—'} cft</span></div>
              <div class="field"><span class="field-label">Registered</span><span class="field-value">${lot.createdAt ? new Date(lot.createdAt).toLocaleDateString() : '—'}</span></div>
              ${lot.txHash ? `<div class="field" style="grid-column:1/-1"><span class="field-label">Tx</span><a href="https://sepolia.etherscan.io/tx/${lot.txHash}" target="_blank" style="color:var(--accent2);font-size:0.75rem;font-family:monospace;">${lot.txHash.slice(0,18)}…</a></div>` : ''}
            </div>
          </div>
        </div>

        <!-- Batch -->
        <div class="chain-node">
          <div class="node-icon batch">🪵</div>
          <div class="node-card">
            <div class="node-label">Step 3 — Factory Purchase</div>
            <div class="node-title blue">Batch #${batch.id}</div>
            <div class="node-fields">
              <div class="field"><span class="field-label">Purchased by</span><span class="field-value mono">${batch.factory ? shortenAddr(batch.factory) : '—'}</span></div>
              <div class="field"><span class="field-label">Qty Bought</span><span class="field-value highlight blue">${batch.qty ?? '—'} cft</span></div>
              <div class="field"><span class="field-label">Remaining</span><span class="field-value">${batch.remainingQty ?? '—'} cft</span></div>
              <div class="field"><span class="field-label">Parent Lot</span><span class="field-value">#${batch.parentLotId}</span></div>
              ${batch.txHash ? `<div class="field" style="grid-column:1/-1"><span class="field-label">Tx</span><a href="https://sepolia.etherscan.io/tx/${batch.txHash}" target="_blank" style="color:var(--accent2);font-size:0.75rem;font-family:monospace;">${batch.txHash.slice(0,18)}…</a></div>` : ''}
            </div>
          </div>
        </div>

        <!-- Furniture -->
        <div class="chain-node">
          <div class="node-icon furn">🛏️</div>
          <div class="node-card">
            <div class="node-label">Step 4 — Furniture Manufactured</div>
            <div class="node-title amber">Furniture #${furniture.id} — ${furniture.type || '—'}</div>
            <div class="node-fields">
              <div class="field"><span class="field-label">Manufactured by</span><span class="field-value mono">${furniture.manufacturer ? shortenAddr(furniture.manufacturer) : '—'}</span></div>
              <div class="field"><span class="field-label">Wood Used</span><span class="field-value highlight amber">${furniture.qtyUsed ?? '—'} cft</span></div>
              <div class="field"><span class="field-label">Source Batch</span><span class="field-value">#${furniture.sourceBatchId ?? batch.id}</span></div>
              <div class="field"><span class="field-label">Created</span><span class="field-value">${furniture.createdAt ? new Date(furniture.createdAt).toLocaleDateString() : '—'}</span></div>
              ${furniture.ipfsHash ? `<div class="field"><span class="field-label">Certificate</span><a href="https://gateway.pinata.cloud/ipfs/${furniture.ipfsHash}" target="_blank" style="color:var(--accent2);font-size:0.8rem;">View on IPFS ↗</a></div>` : ''}
              ${furniture.txHash ? `<div class="field" style="grid-column:1/-1"><span class="field-label">Tx</span><a href="https://sepolia.etherscan.io/tx/${furniture.txHash}" target="_blank" style="color:var(--accent2);font-size:0.75rem;font-family:monospace;">${furniture.txHash.slice(0,18)}…</a></div>` : ''}
            </div>
          </div>
        </div>

      </div><!-- .timeline -->

      <div style="text-align:center;color:var(--muted);font-size:0.8rem;margin-top:2rem;padding-bottom:2rem;">
        Provenance data sourced from <strong>Ethereum Sepolia</strong> blockchain.
        The off-chain database is a read mirror — on-chain is the source of truth.
      </div>
    `;
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.style.display = 'block';
    el.innerHTML = `<div class="error-box"><h3>❌ Not Found</h3><p>${msg}</p></div>`;
  }
</script>
</body>
</html>
