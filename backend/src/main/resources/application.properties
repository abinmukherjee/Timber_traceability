# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL DataSource ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/timber_db
spring.datasource.username=postgres
spring.datasource.password=timber123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Jackson (JSON) ───────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── CORS (allow frontend origin) ─────────────────────────────────────────────
# Adjust for your deployment; permissive for development
cors.allowed-origins=*

# ── Contract config ──────────────────────────────────────────────────────────
# Fill in after deploying the contract
contract.address=0x095Ac1aF9dB0bbaFd75c9deBAa3AEC7de471A98a

# ── Pinata / IPFS ────────────────────────────────────────────────────────────
pinata.jwt=caafa52aeb3817e72c00

# ── QR Code output ───────────────────────────────────────────────────────────
# Directory where QR code PNG files are stored
qr.output.dir=./qr-codes

# ── Application base URL (used in QR code content) ───────────────────────────
app.base.url=http://localhost:5500
