# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL DataSource ────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/timber_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Jackson (JSON) ───────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── CORS (allow frontend origin) ─────────────────────────────────────────────
# Adjust for your deployment; permissive for development
cors.allowed-origins=*

# ── Contract config ──────────────────────────────────────────────────────────
contract.address=${CONTRACT_ADDRESS:0x095Ac1aF9dB0bbaFd75c9deBAa3AEC7de471A98a}

# ── Pinata / IPFS ────────────────────────────────────────────────────────────
pinata.jwt=${PINATA_JWT:}

# ── QR Code output ───────────────────────────────────────────────────────────
# Directory where QR code PNG files are stored
qr.output.dir=${QR_OUTPUT_DIR:./qr-codes}

# ── Application base URL (used in QR code content) ───────────────────────────
app.base.url=${APP_BASE_URL:http://localhost:5500}
