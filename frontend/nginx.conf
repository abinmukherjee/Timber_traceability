server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every route (including /verify.html?id=… from old QR codes)
    # resolves to index.html so React Router can handle it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # contract-config.json must never be cached — it changes on redeploy.
    location = /contract-config.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Long-cache hashed build assets.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
